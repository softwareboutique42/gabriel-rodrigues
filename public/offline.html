<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0e0e0e" />
    <title>Offline — GR_</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0e0e0e;
        color: #e8e6e3;
        font-family: 'JetBrains Mono', 'SF Mono', monospace;
      }
      .container {
        text-align: center;
        padding: 2rem;
      }
      .logo {
        font-size: 2.5rem;
        font-weight: 700;
        color: #8eff71;
        margin-bottom: 1.5rem;
        letter-spacing: -1px;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 400;
        color: #9a9894;
        margin-bottom: 0.75rem;
      }
      p {
        font-size: 0.875rem;
        color: #5e5c58;
        max-width: 320px;
        line-height: 1.6;
      }
      .retry {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.5rem 1.25rem;
        color: #8eff71;
        border: 1px solid rgba(142, 255, 113, 0.2);
        background: transparent;
        font-family: inherit;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        cursor: pointer;
        transition: border-color 0.2s;
      }
      .retry:hover {
        border-color: #8eff71;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">> GR_</div>
      <h1>You're offline</h1>
      <p>This page hasn't been cached yet. Connect to the internet and try again.</p>
      <button class="retry" onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
